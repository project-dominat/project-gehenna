- type: entity
  parent: BaseItem
  id: GehennaTraumaScanner
  name: trauma scanner
  description: A compact medical scanner tuned for procedural trauma diagnostics.
  components:
  - type: Sprite
    sprite: Objects/Specific/Medical/healthanalyzer.rsi
    layers:
    - state: icon
    - state: analyzer
      shader: unshaded
  - type: Item
    heldPrefix: analyzer
    storedRotation: -90
  - type: ActivatableUI
    key: enum.GehennaTraumaScannerUiKey.Key
  - type: UserInterface
    interfaces:
      enum.GehennaTraumaScannerUiKey.Key:
        type: GehennaTraumaScannerBoundUserInterface
  - type: ItemToggle
    onUse: false
  - type: GehennaTraumaScanner
    scanningEndSound:
      path: "/Audio/Items/Medical/healthscanner.ogg"
  - type: GuideHelp
    guides:
    - MedicalDoctor

- type: entity
  parent: BaseHealingItem
  id: GehennaElasticBandage
  name: elastic bandage
  description: A quick field dressing for stabilizing open wounds.
  suffix: Full
  components:
  - type: Sprite
    state: brutepack
  - type: Item
    heldPrefix: brutepack
  - type: GehennaTraumaTreatment
    treatment: Bandage
    delay: 1
    beginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    endSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: Brutepack
    count: 10
  - type: StackPrice
    price: 5

- type: entity
  parent: GehennaElasticBandage
  id: GehennaElasticBandage1
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  parent: BaseHealingItem
  id: GehennaSutureKit
  name: suture kit
  description: Sterile sutures for closing stabilized wounds.
  suffix: Full
  components:
  - type: Sprite
    state: medicated-suture
  - type: Item
    heldPrefix: medicated-suture
    storedRotation: -90
  - type: GehennaTraumaTreatment
    treatment: Suture
    delay: 3
    beginSound:
      path: "/Audio/Items/Medical/brutepack_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    endSound:
      path: "/Audio/Items/Medical/brutepack_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: MedicatedSuture
    count: 10
  - type: StackPrice
    price: 20

- type: entity
  parent: GehennaSutureKit
  id: GehennaSutureKit1
  suffix: Single
  components:
  - type: Stack
    count: 1

- type: entity
  parent: BaseHealingItem
  id: GehennaBurnOintment
  name: burn ointment
  description: A topical treatment for minor and moderate burns.
  suffix: Full
  components:
  - type: Tag
    tags:
    - Ointment
  - type: Sprite
    state: ointment
  - type: Item
    heldPrefix: ointment
    storedSprite:
      state: ointment-storage
      sprite: Objects/Specific/Medical/medical.rsi
  - type: GehennaTraumaTreatment
    treatment: Ointment
    treatBurns: true
    maxBurnDegree: 2
    delay: 2
    beginSound:
      path: "/Audio/Items/Medical/ointment_begin.ogg"
      params:
        volume: 1.0
        variation: 0.125
    endSound:
      path: "/Audio/Items/Medical/ointment_end.ogg"
      params:
        volume: 1.0
        variation: 0.125
  - type: Stack
    stackType: Ointment
    count: 10
  - type: StackPrice
    price: 5

- type: entity
  parent: GehennaBurnOintment
  id: GehennaBurnOintment1
  suffix: Single
  components:
  - type: Stack
    count: 1
